# mpv-seekpeek configuration
# Place this file in: ~/.config/mpv/script-opts/mpv_seekpeek.conf

# Auto-start sprite generation on playback (yes/no)
auto_start=yes

# Delete sprite file when player quits (yes/no)
delete_sprite_on_exit=no

# Automatically set fullscreen on playback start (yes/no)
auto_fullscreen=yes

# Enable/disable preview overlay (yes/no)
preview_enabled=yes

# Duration for OSD messages in seconds
message_duration=3

# Seconds between thumbnail samples
thumbnail_interval=5

# Preview thumbnail dimensions in pixels
preview_width=240
preview_height=100

# Sprite sheet grid size
sprite_grid_rows=30
sprite_grid_cols=30

# Keybindings (set to empty string to disable)
key_generate=T
key_regenerate=Ctrl+T
key_toggle_preview=Ctrl+S
key_delete_sprite=Alt+T
